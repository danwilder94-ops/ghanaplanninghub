<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ghana Zoning Quick Reference | LUSPA 2025</title>
<style>

@import url('data:text/css,');
:root{
  --bg:#f4f3ed;--bg2:#fff;--bg3:#f9f8f4;--bg4:#eeeae0;
  --text:#1a1916;--text2:#5a5650;--text3:#9a9480;
  --border:#e0ddd0;--border2:#ccc8b8;
  --sb:#0d2410;--sb2:#162e18;--sb3:#1e3820;
  --sb-text:#d0e8d4;--sb-text2:#90b895;--sb-act:#2a5a30;
  --hdr:#152e18;
  --gold:#c8960c;--gold-bg:#fdf8ec;--gold-text:#7a5800;
  --green:#1a4020;--green2:#2a5a30;--green3:#3a7040;
  --red:#8a0000;--red-bg:#fff0f0;
  --blue:#1a2e80;--blue-bg:#eef2ff;
  --purple:#4a0a6a;--purple-bg:#f5eeff;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  --shadow-md:0 4px 20px rgba(0,0,0,.12);
  --font-head:Georgia,'Times New Roman',serif;
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  --transition:0.18s ease;
}
.dk{
  --bg:#111210;--bg2:#181815;--bg3:#1e1e1a;--bg4:#282824;
  --text:#e8e6de;--text2:#a8a498;--text3:#666258;
  --border:#2e2c24;--border2:#3e3c30;
  --sb:#0a1a0c;--sb2:#0f200f;--sb3:#152415;
  --sb-text:#b8d8bc;--sb-text2:#70987a;--sb-act:#204820;
  --hdr:#0a1a0c;
  --gold:#e0aa1a;--gold-bg:#201808;--gold-text:#e0aa1a;
  --green:#2a5a30;--green2:#3a7040;--green3:#4a8850;
  --red:#cc4444;--red-bg:#200a0a;
  --blue:#4060aa;--blue-bg:#0a1030;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 14px rgba(0,0,0,.25);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:13px;
  display:grid;grid-template-rows:54px 1fr;grid-template-columns:244px 1fr;transition:background var(--transition),color var(--transition)}
/* HEADER */
header{grid-column:1/-1;background:var(--hdr);display:flex;align-items:center;gap:12px;
  padding:0 16px;border-bottom:1px solid rgba(255,255,255,.08);z-index:300;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;width:220px}
.brand-icon{font-size:22px;line-height:1}
.brand-text h1{font-size:13px;font-weight:700;color:#fff;font-family:var(--font-head);letter-spacing:.3px}
.brand-text p{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px}
.search-wrap{flex:1;position:relative;max-width:500px}
.search-wrap input{width:100%;padding:7px 12px 7px 34px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.18);border-radius:20px;color:#fff;font-size:13px;outline:none}
.search-wrap input::placeholder{color:rgba(255,255,255,.4)}
.search-wrap input:focus{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.35)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);font-size:14px;pointer-events:none}
.hdr-right{margin-left:auto;display:flex;gap:6px;align-items:center;flex-shrink:0}
.hdr-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.85);
  border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:var(--font-body)}
.hdr-btn:hover{background:rgba(255,255,255,.2)}
.hdr-btn.active{background:rgba(255,255,255,.25);color:#fff}
.ctx-pills{display:flex;gap:4px}
.cpill{padding:4px 11px;border:1px solid rgba(255,255,255,.2);border-radius:12px;font-size:11px;
  cursor:pointer;background:transparent;color:rgba(255,255,255,.7);font-family:var(--font-body)}
.cpill:hover{background:rgba(255,255,255,.12)}
.cpill.on{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.45)}
.mob-toggle{display:none;background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px}
/* SIDEBAR */
aside{background:var(--sb);overflow-y:auto;border-right:1px solid rgba(255,255,255,.06);z-index:200;
  scrollbar-width:thin;scrollbar-color:var(--sb3) transparent}
aside::-webkit-scrollbar{width:4px}
aside::-webkit-scrollbar-thumb{background:var(--sb3);border-radius:2px}
.sb-section{padding:10px 0 4px}
.sb-section+.sb-section{border-top:1px solid rgba(255,255,255,.06)}
.sb-label{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--sb-text2);padding:0 14px 6px;display:flex;justify-content:space-between;align-items:center}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;
  color:var(--sb-text);font-size:12px;transition:background var(--transition);border:none;background:none;
  width:100%;text-align:left;font-family:var(--font-body)}
.sb-item:hover{background:rgba(255,255,255,.06)}
.sb-item.on{background:var(--sb-act);color:#fff}
.sb-item.on .sb-count{background:rgba(255,255,255,.2);color:#fff}
.sb-count{margin-left:auto;font-size:10px;background:rgba(255,255,255,.1);color:var(--sb-text2);
  padding:1px 6px;border-radius:8px;flex-shrink:0}
.sb-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sb-sub{padding:4px 14px 6px}
.sb-tool-btn{width:100%;padding:6px 10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-sm);color:var(--sb-text);font-size:11px;cursor:pointer;text-align:left;
  margin-bottom:4px;display:flex;align-items:center;gap:6px;font-family:var(--font-body);transition:background var(--transition)}
.sb-tool-btn:hover{background:rgba(255,255,255,.14);color:#fff}
.sb-rec-item,.sb-fav-item{display:flex;align-items:center;gap:6px;padding:5px 14px;cursor:pointer;
  color:var(--sb-text);font-size:11px;transition:background var(--transition)}
.sb-rec-item:hover,.sb-fav-item:hover{background:rgba(255,255,255,.06)}
.sb-rec-code{font-size:10px;font-weight:700;color:var(--gold);width:36px;flex-shrink:0}
.sb-rec-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.sb-empty{font-size:11px;color:var(--sb-text2);padding:4px 14px 8px;font-style:italic}
/* MAIN */
main{overflow-y:auto;padding:14px 16px 32px;background:var(--bg)}
.main-topbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.count-badge{background:var(--gold-bg);color:var(--gold-text);border:1px solid rgba(200,150,12,.25);
  border-radius:12px;font-size:11px;font-weight:600;padding:3px 10px}
.view-btns{display:flex;gap:0;margin-left:auto}
.view-btn{padding:5px 9px;border:1px solid var(--border2);font-size:13px;background:var(--bg2);color:var(--text2);cursor:pointer}
.view-btn:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.view-btn:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-left:-1px}
.view-btn.on{background:var(--green2);color:#fff;border-color:var(--green2);z-index:1}
/* CARDS GRID */
.cards-area{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:11px}
.cards-area.list{grid-template-columns:1fr}
/* ZONE CARD */
.zone-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow);border-left-width:4px;transition:box-shadow .15s,transform .1s;animation:fadeIn .25s ease}
.zone-card:hover{box-shadow:var(--shadow-md)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-hdr{padding:9px 12px;display:flex;align-items:flex-start;gap:8px;background:var(--bg3);border-bottom:1px solid var(--border)}
.zbadge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap;
  border:1px solid transparent;flex-shrink:0;margin-top:2px;font-family:var(--font-body)}
.zinfo{flex:1}
.zname{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3}
.ztags{display:flex;gap:3px;flex-wrap:wrap}
.ztag{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.card-acts{display:flex;gap:3px;flex-shrink:0;margin-top:1px}
.cact{background:none;border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px;
  cursor:pointer;color:var(--text2);transition:all .12s}
.cact:hover{background:var(--bg4);color:var(--text)}
.cact.on{background:var(--gold-bg);color:var(--gold-text);border-color:rgba(200,150,12,.4)}
.std-table{width:100%;border-collapse:collapse}
.std-table td{padding:4px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:top}
.std-table tr:last-child td{border-bottom:none}
.std-table td:first-child{color:var(--text2);width:47%;padding-right:4px;line-height:1.4}
.std-table td:last-child{color:var(--text);font-weight:500;line-height:1.4}
.density-bar{height:3px;background:var(--border);margin:2px 0 6px}
.density-fill{height:100%;background:linear-gradient(90deg,var(--green3),var(--gold));border-radius:2px}
/* LIST VIEW card overrides */
.list .zone-card{display:grid;grid-template-columns:1fr}
.list .card-hdr{border-bottom:none}
/* SVG DIAGRAM */
.diag-wrap{padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg3)}
.diag-lbl{font-size:10px;color:var(--text2);margin-bottom:4px;font-weight:500}
/* USES */
.uses-toggle{padding:7px 12px;font-size:12px;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;gap:6px;border-top:1px solid var(--border);background:var(--bg3)}
.uses-toggle:hover{background:var(--bg4)}
.chevron{display:inline-block;transition:transform .18s}
.uses-panel{display:none;padding:10px 12px;border-top:1px solid var(--border);animation:fadeIn .15s ease}
.uses-panel.op{display:block}
.uses-lbl{font-size:10px;font-weight:700;margin-bottom:4px;padding:2px 7px;border-radius:3px;display:inline-block;
  letter-spacing:.4px;text-transform:uppercase}
.ul-p{background:var(--green2)12;color:var(--green2)}
.dk .ul-p{background:rgba(40,100,50,.4);color:#80d890}
.ul-x{background:var(--red-bg);color:var(--red)}
.ul-n{background:var(--bg4);color:var(--text2)}
.uses-list{list-style:none;display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.uses-list li{font-size:11px;padding:2px 7px;border-radius:3px;background:var(--bg3);
  color:var(--text2);border:1px solid var(--border);line-height:1.4}
/* USER NOTE */
.card-note{padding:6px 12px;font-size:11px;background:var(--gold-bg);color:var(--gold-text);
  border-top:1px solid rgba(200,150,12,.2);font-style:italic;cursor:pointer}
.card-note:hover{background:#fdf0d0}
/* MISC */
.section-hdr{font-size:15px;font-weight:700;margin:20px 0 10px;color:var(--green);
  padding-bottom:7px;border-bottom:2px solid var(--green3);display:flex;align-items:center;gap:8px;
  font-family:var(--font-head)}
.misc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:10px}
.misc-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;
  box-shadow:var(--shadow)}
.misc-title{font-size:11px;font-weight:700;color:var(--green2);margin-bottom:8px;text-transform:uppercase;
  letter-spacing:.5px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.misc-row{display:flex;justify-content:space-between;align-items:baseline;
  padding:4px 0;border-bottom:1px solid var(--border);font-size:11px;gap:8px}
.misc-row:last-child{border-bottom:none}
.misc-row span:first-child{color:var(--text2);flex:1;line-height:1.4}
.misc-row span:last-child{color:var(--text);font-weight:600;text-align:right;white-space:nowrap}
/* NO RESULTS */
.no-results{grid-column:1/-1;padding:48px;text-align:center;color:var(--text2)}
.no-results h3{font-size:15px;margin-bottom:6px;font-family:var(--font-head)}
/* MODAL */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;backdrop-filter:blur(3px)}
#overlay.op{display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border-radius:var(--radius);width:min(740px,95vw);max-height:88vh;
  overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);
  animation:modalIn .22s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-hdr{padding:16px 20px;background:var(--hdr);display:flex;align-items:center;gap:10px}
.modal-hdr h2{font-size:15px;font-weight:700;color:#fff;font-family:var(--font-head);flex:1}
.modal-hdr p{font-size:11px;color:rgba(255,255,255,.5)}
.modal-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;
  border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;line-height:1}
.modal-close:hover{background:rgba(255,255,255,.3)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-body h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;
  font-family:var(--font-head);padding-bottom:6px;border-bottom:1px solid var(--border)}
/* FORM ELEMENTS IN MODAL */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:16px}
.fld label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fld input,.fld select{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);
  font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:var(--font-body)}
.fld input:focus,.fld select:focus{border-color:var(--green3);box-shadow:0 0 0 3px rgba(42,90,48,.15)}
.fld textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);
  font-size:12px;background:var(--bg);color:var(--text);outline:none;resize:vertical;
  font-family:var(--font-body);min-height:90px}
.fld textarea:focus{border-color:var(--green3)}
.result-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:16px}
.result-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:14px}
.rstat{text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px}
.rstat .rv{font-size:18px;font-weight:700;color:var(--green2);font-family:var(--font-head)}
.rstat .rl{font-size:10px;color:var(--text2);margin-top:2px}
.notes-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.notes-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg3);
  border:1px solid var(--border);border-radius:var(--radius-sm);font-size:11px}
.notes-item .nc{font-weight:700;color:var(--green2);width:40px;flex-shrink:0}
.notes-item .nn{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notes-item .nt{color:var(--text);flex:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
/* CHECKLIST */
.cl-section{margin-bottom:16px}
.cl-section h4{font-size:12px;font-weight:700;color:var(--green2);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:8px;padding:4px 0;border-bottom:1px solid var(--border)}
.cl-item{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:12px;color:var(--text)}
.cl-item input[type=checkbox]{width:14px;height:14px;margin-top:1px;flex-shrink:0;accent-color:var(--green2)}
.cl-item.critical .cl-text{font-weight:600}
.cl-item.note .cl-text{color:var(--text2);font-size:11px;font-style:italic}
/* FINDER RESULTS */
.finder-res{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.finder-col h4{font-size:11px;font-weight:700;padding:4px 0;margin-bottom:6px;
  border-bottom:2px solid;text-transform:uppercase;letter-spacing:.4px}
.finder-col.perm h4{color:var(--green2);border-color:var(--green2)}
.finder-col.proh h4{color:var(--red);border-color:var(--red)}
.finder-badge{display:inline-flex;align-items:center;gap:4px;margin:2px;padding:3px 8px;
  border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;transition:all .12s}
.finder-badge:hover{opacity:.8;transform:translateY(-1px)}
/* LEGEND */
.legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.leg-group-hdr{grid-column:1/-1;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--text2);padding:10px 4px 5px;border-bottom:2px solid var(--border2);
  margin-top:6px;display:flex;align-items:center;gap:6px}
.leg-group-hdr:first-child{margin-top:0}
.leg-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg3);
  border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .14s}
.leg-item:hover{background:var(--bg4);box-shadow:var(--shadow);transform:translateY(-1px)}
.leg-swatch{width:50px;height:38px;border-radius:5px;border:1px solid rgba(0,0,0,.18);flex-shrink:0;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.1)}
.leg-info{flex:1;min-width:0}
.leg-codes{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.leg-zbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;border:1px solid}
.leg-names{font-size:12px;color:var(--text);font-weight:500;margin-bottom:4px;line-height:1.35}
.leg-hex-row{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap}
.leg-hex{font-size:12px;font-weight:700;font-family:monospace;letter-spacing:.4px;color:var(--text)}
.leg-colorname{font-size:11px;color:var(--text2)}
.leg-copy-btn{font-size:10px;padding:2px 7px;background:var(--bg2);border:1px solid var(--border2);
  border-radius:3px;color:var(--text2);cursor:pointer;font-family:var(--font-body);
  transition:all .12s;white-space:nowrap}
.leg-copy-btn:hover{background:var(--green2);color:#fff;border-color:var(--green2)}
.leg-pattern{font-size:10px;color:var(--text3);font-style:italic;margin-top:2px}
.leg-intro{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.5;padding:10px 12px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm)}
/* COMPARE */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cmp-card h4{font-size:13px;font-weight:700;padding:8px 0 6px;border-bottom:2px solid;margin-bottom:8px;font-family:var(--font-head)}
.cmp-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px;gap:6px}
.cmp-row span:first-child{color:var(--text2);flex:1}
.cmp-row span:last-child{font-weight:600;text-align:right}
/* BUFFER RESULT */
.buf-big{text-align:center;padding:16px;background:var(--green2)0d;border:2px solid var(--green3);
  border-radius:var(--radius);margin-bottom:12px}
.buf-num{font-size:40px;font-weight:700;color:var(--green2);font-family:var(--font-head)}
.buf-breakdown{font-size:11px;color:var(--text2);margin-top:8px}
.buf-breakdown span{display:inline-block;margin:2px 4px;padding:2px 7px;background:var(--bg3);
  border-radius:4px;border:1px solid var(--border)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green2);color:#fff;padding:9px 16px;
  border-radius:var(--radius-sm);font-size:12px;z-index:600;opacity:0;transform:translateY(8px);
  transition:all .2s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.sh{opacity:1;transform:translateY(0)}
/* FOOTER */
footer{display:none}
/* SHORTCUTS MODAL */
.shortcut-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.sc-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);
  border-radius:var(--radius-sm);font-size:12px}
.sc-key{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;
  padding:2px 8px;font-size:11px;font-weight:700;font-family:monospace;flex-shrink:0;min-width:32px;text-align:center}
/* MOBILE */
@media(max-width:768px){
  body{grid-template-columns:1fr;grid-template-rows:54px 1fr}
  aside{position:fixed;left:-244px;top:54px;bottom:0;width:244px;z-index:250;
    transition:left .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.3)}
  aside.open{left:0}
  .mob-toggle{display:block}
  .ctx-pills,.hdr-btn:not(#darkBtn):not(#mobToggle){display:none}
  main{grid-column:1;overflow:scroll}
}
/* PRINT */
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{display:block;height:auto;overflow:visible;background:#fff;color:#000}
  header,aside,#overlay,.card-acts,.uses-toggle,#mainTopbar,#catBar,.toast{display:none!important}
  main{padding:0;overflow:visible}
  .zone-card{break-inside:avoid;margin-bottom:16px;border:1px solid #ccc!important;border-left-width:5px!important}
  .uses-panel{display:block!important}
  .cards-area{display:block}
  .diag-wrap svg{max-width:220px}
}

/* PLAN PREP SECTION */
.pp-section{margin-bottom:28px}
.pp-section-hdr{font-size:15px;font-weight:700;margin:20px 0 12px;color:var(--green);
  padding-bottom:7px;border-bottom:2px solid var(--green3);display:flex;align-items:center;
  gap:8px;font-family:var(--font-head)}
.plan-hierarchy{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:16px}
.plan-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;border-left-width:5px;box-shadow:var(--shadow)}
.plan-card-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px}
.plan-icon{font-size:22px}
.plan-card-title{font-size:14px;font-weight:700;color:var(--text);font-family:var(--font-head)}
.plan-card-sub{font-size:11px;color:var(--text2);margin-top:1px}
.plan-card-body{padding:0 14px 12px}
.plan-kv{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.plan-kv:last-child{border-bottom:none}
.plan-kv span:first-child{color:var(--text2)}
.plan-kv span:last-child{font-weight:600;color:var(--text);text-align:right}
.plan-btn{display:block;margin:10px 14px;padding:7px;background:var(--green2);color:#fff;border:none;
  border-radius:var(--radius-sm);font-size:12px;cursor:pointer;text-align:center;font-family:var(--font-body);
  transition:background .14s}
.plan-btn:hover{background:var(--green3)}

.steps-intro{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6;padding:10px 12px;

.step-list{display:flex;flex-direction:column;gap:10px}
.step-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
  cursor:pointer;transition:box-shadow .14s}
.step-item:hover{box-shadow:var(--shadow)}
.step-hdr{display:flex;align-items:flex-start;gap:10px;padding:10px 14px}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--green2);color:#fff;
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-size:13px;font-weight:600;color:var(--text);flex:1;line-height:1.35}
.step-output{font-size:10px;font-weight:700;background:var(--green-light);color:var(--green2);
  padding:2px 7px;border-radius:3px;margin-top:3px;display:inline-block;font-family:var(--font-body)}
.step-caret{color:var(--text3);font-size:13px;flex-shrink:0;margin-top:2px;transition:transform .18s}
.step-body{display:none;padding:0 14px 12px}
.step-body.op{display:block}
.step-body ul{list-style:none;padding:0}
.step-body ul li{font-size:12px;color:var(--text2);padding:3px 0 3px 12px;border-bottom:1px solid var(--border);
  line-height:1.45;position:relative}
.step-body ul li::before{content:"›";position:absolute;left:0;color:var(--green3);font-weight:700}
.step-body ul li:last-child{border-bottom:none}
.step-note{font-size:11px;color:var(--gold-text);background:var(--gold-bg);border:1px solid rgba(200,150,12,.2);
  border-radius:4px;padding:6px 8px;margin-top:8px;line-height:1.5}
/* APPROVAL TABLE */
.appr-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
.appr-table th{background:var(--green2);color:#fff;padding:7px 10px;text-align:left;font-size:11px;
  text-transform:uppercase;letter-spacing:.4px}
.appr-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.appr-table tr:hover td{background:var(--bg3)}
/* TSC */
.tsc-member{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.tsc-member:last-child{border-bottom:none}
.tsc-icon{font-size:14px;width:22px;text-align:center;flex-shrink:0}
/* DATA GUIDE */
.data-cat{margin-bottom:14px}
.data-cat-hdr{font-size:12px;font-weight:700;color:var(--green2);padding:6px 10px;
  background:var(--green-light);border-radius:var(--radius-sm);margin-bottom:6px;
  display:flex;align-items:center;gap:6px;cursor:pointer}
.dk .data-cat-hdr{background:rgba(42,90,48,.3)}
.data-cat-body{display:none;padding:0 4px}
.data-cat-body.op{display:block}
.data-q{font-size:12px;color:var(--text2);padding:4px 0 4px 14px;border-bottom:1px solid var(--border);
  position:relative;line-height:1.4}
.data-q::before{content:"Q.";position:absolute;left:0;color:var(--green3);font-weight:700;font-size:10px;top:5px}
.data-q:last-child{border-bottom:none}
/* CONSULT */
.consult-step{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.consult-step:last-child{border-bottom:none}
.consult-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--green2);
  background:var(--green2);color:#fff;font-size:11px;font-weight:700;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.consult-info{flex:1}
.consult-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.consult-desc{font-size:11px;color:var(--text2);line-height:1.45}
/* LEGAL REFS */
.legal-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:flex-start}
.legal-item:last-child{border-bottom:none}
.legal-badge{background:var(--green2);color:#fff;padding:2px 7px;border-radius:3px;font-size:10px;
  font-weight:700;flex-shrink:0;margin-top:1px}
.legal-text{color:var(--text2);flex:1;line-height:1.4}

function lsGet(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function loadState(){
  S.favs=lsGet('zf',[]);S.notes=lsGet('zn',{});S.recent=lsGet('zr',[]);
  if(lsGet('zdk',false))document.body.classList.add('dk');
  S.view=lsGet('zv','grid');
}
function addRecent(code,name){
  S.recent=S.recent.filter(function(r){return r.c!==code;});
  S.recent.unshift({c:code,n:name});
  if(S.recent.length>8)S.recent.pop();
  lsSet('zr',S.recent);updateSidebar();
}
function toggleFav(code){
  var i=S.favs.indexOf(code);
  if(i>-1)S.favs.splice(i,1);else S.favs.push(code);
  lsSet('zf',S.favs);updateSidebar();render();
}
function isFav(code){return S.favs.indexOf(code)>-1;}
function saveNote(code,text){

function initSidebar(){
  var html='';
  cats.forEach(function(c){
    var cnt=c.id==='all'?zones.length:zones.filter(function(z){return z.cat===c.id;}).length;
    html+='<button class="sb-item'+(S.cat===c.id?' on':'')+'" id="sbi-'+c.id+'" onclick="setCat(\''+c.id+'\')">'
      +'<span class="sb-icon">'+c.icon+'</span>'
      +'<span>'+c.label+'</span>'
      +'<span class="sb-count">'+cnt+'</span>'
      +'</button>';
  });
  document.getElementById('sbCats').innerHTML=html;
}
function updateSidebar(){
  document.querySelectorAll('.sb-item').forEach(function(b){b.classList.remove('on');});
  var el=document.getElementById('sbi-'+S.cat);
  if(el)el.classList.add('on');
  var favEl=document.getElementById('sbFavs');
  if(S.favs.length){
    favEl.innerHTML=S.favs.map(function(c){
      var z=zones.find(function(zz){return zz.code===c;});

        +'<span style="color:var(--gold);font-size:11px">&#11088;</span>'
        +'<span class="sb-rec-code">'+c+'</span>'
        +'<span class="sb-rec-name">'+z.name+'</span>'
        +'</div>';
    }).join('');
  } else { favEl.innerHTML='<div class="sb-empty">No favourites yet</div>'; }
  var recEl=document.getElementById('sbRecent');

    recEl.innerHTML=S.recent.map(function(r){
      return '<div class="sb-rec-item" onclick="scrollToZone(\''+r.c+'\')">'
        +'<span class="sb-rec-code">'+r.c+'</span>'

function scrollToZone(code){
  var el=document.getElementById('zc-'+code.replace(/[^a-zA-Z0-9]/g,''));
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});
    el.style.outline='2px solid var(--gold)';

// ── FILTER & RENDER ───────────────────────────────────────────────
function setCtx(c,btn){
  S.ctx=c;
  document.querySelectorAll('.cpill').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');render();
}
function setCat(c){S.cat=c;updateSidebar();render();}
function setView(v){
  S.view=v;lsSet('zv',v);
  document.getElementById('vGrid').classList.toggle('on',v==='grid');
  document.getElementById('vList').classList.toggle('on',v==='list');
  document.getElementById('cardsArea').className='cards-area'+(v==='list'?' list':'');
}
function ctxMatch(z){
  if(S.ctx==='all')return true;
  if(S.ctx==='urban')return z.ctx.indexOf('urban')>-1||z.ctx.indexOf('builtup')>-1;
  if(S.ctx==='greenfield')return z.ctx.indexOf('greenfield')>-1;
  if(S.ctx==='rural')return z.ctx.indexOf('rural')>-1;
  return true;
}
function render(){
  var q=document.getElementById('srch').value.toLowerCase();
  var fil=zones.filter(function(z){
    if(S.cat!=='all'&&z.cat!==S.cat)return false;
    if(!ctxMatch(z))return false;
    if(!q)return true;
    return z.code.toLowerCase().indexOf(q)>-1||z.name.toLowerCase().indexOf(q)>-1||
      Object.values(z.std).some(function(v){return v.toLowerCase().indexOf(q)>-1;})||
      z.permit.some(function(v){return v.toLowerCase().indexOf(q)>-1;})||
      z.prohibit.some(function(v){return v.toLowerCase().indexOf(q)>-1;});
  });
  document.getElementById('countBadge').textContent=fil.length+' zone'+(fil.length!==1?'s':'')+(q?' found':' shown');
  var area=document.getElementById('cardsArea');
  if(!fil.length){
    area.innerHTML='<div class="no-results"><h3>No matching zones</h3><p>Try different filters or a broader search term.</p></div>';
    return;
  }
  area.innerHTML=fil.map(cardHtml).join('');
  area.className='cards-area'+(S.view==='list'?' list':'');
  area.querySelectorAll('.uses-toggle').forEach(function(t){
    t.addEventListener('click',function(){
      this.classList.toggle('op');
      this.querySelector('.chevron').style.transform=this.classList.contains('op')?'rotate(180deg)':'';
      this.nextElementSibling.classList.toggle('op');
    });
  });
}
function tagLabel(c){return{urban:'Built-up',builtup:'Built-up',greenfield:'Greenfield',rural:'Rural'}[c]||c;}

function cardHtml(z){
  var uid='zc-'+z.code.replace(/[^a-zA-Z0-9]/g,'');
  var tags=z.ctx.map(function(c){return '<span class="ztag">'+tagLabel(c)+'</span>';}).join('');
  var fav=isFav(z.code);
  var note=S.notes[z.code]||'';
  var rows=Object.entries(z.std).map(function(e){return '<tr><td>'+e[0]+'</td><td>'+e[1]+'</td></tr>';}).join('');
  var pl=z.permit.map(function(p){return '<li>'+p+'</li>';}).join('');
  var xl=z.prohibit.map(function(p){return '<li>'+p+'</li>';}).join('');
  var densBar=z.density>0?'<div class="density-bar"><div class="density-fill" style="width:'+Math.min(z.density*20,100)+'%"></div></div>':'';
  var diagHtml='';
  if(z.diag&&calcZones[z.diag.k]){
    diagHtml='<div class="diag-wrap"><div class="diag-lbl">Plot layout (minimum dimensions, illustrative)</div>'
      +makePlotSVG(z.diag.w,z.diag.d,calcZones[z.diag.k])+'</div>';
  }
  var noteHtml=note?'<div class="card-note" onclick="openNoteModal(\''+z.code+'\')">&#128396; '+escHtml(note)+'</div>':'';
  return '<div class="zone-card" id="'+uid+'" style="border-left-color:'+z.lc+'">'
    +'<div class="card-hdr">'
      +'<span class="zbadge" style="background:'+z.bg+';color:'+z.lc+';border-color:'+z.lc+'60">'+z.code+'</span>'
      +'<div class="zinfo">'
        +densBar
        +'<div class="zname">'+z.name+'</div>'
        +'<div class="ztags">'+tags+'</div>'
      +'</div>'
      +'<div class="card-acts">'
        +'<button class="cact'+(fav?' on':'')+'" onclick="toggleFav(\''+z.code+'\')" title="Favourite">&#11088;</button>'
        +'<button class="cact" onclick="openNoteModal(\''+z.code+'\')" title="Add note">&#128396;</button>'
        +'<button class="cact" onclick="copyStd(\''+uid+'\')" title="Copy standards">&#128203;</button>'
        +'<button class="cact" onclick="printCard(\''+uid+'\')" title="Print card">&#128438;</button>'
        +'<button class="cact" onclick="openChecklistFor(\''+z.code+'\')" title="Checklist">&#9989;</button>'
      +'</div>'
    +'</div>'
    +diagHtml
    +'<table class="std-table" id="'+uid+'t"><tbody>'+rows+'</tbody></table>'
    +'<div class="uses-toggle"><span class="chevron" style="transition:transform .18s">&#9660;</span>'
      +'<span>Permitted &amp; prohibited uses</span></div>'
    +'<div class="uses-panel">'
      +'<div><span class="uses-lbl ul-p">&#10003; Permitted</span><ul class="uses-list">'+pl+'</ul></div>'
      +'<div style="margin-top:8px"><span class="uses-lbl ul-x">&#10007; Prohibited</span><ul class="uses-list">'+xl+'</ul></div>'
    +'</div>'
    +noteHtml
  +'</div>';
}

// ── SVG PLOT DIAGRAM ─────────────────────────────────────────────
function makePlotSVG(pw_m,pd_m,z){
  var W=260,H=160,M=12,SIW=26;
  var dW=W-2*M-SIW, dH=H-2*M-14;
  var s=Math.min(dW/pw_m, dH/pd_m, 8);
  var pw=pw_m*s, ph=pd_m*s;
  var ox=M+(dW-pw)/2, oy=M+(dH-ph)/2;
  var fs=z.front*s,rs=z.rear*s,ss=z.side*s;
  var bx=ox+ss,by=oy+fs,bw=pw-2*ss,bh=ph-fs-rs;
  var cH=bh*(z.cov/100), cY=by+(bh-cH);
  var dk=document.body.classList.contains('dk');
  var pf=dk?'#1e2020':'#f9f8f4';
  var bf=dk?'#1a2540':'#ddeeff';
  var cf=dk?'#2a5a9a':'#3a78cc';
  var hc=dk?'#aa5520':'#ff7744';
  var bc=dk?'#555':'#aaa';
  var tc=dk?'#888':'#777';
  var dc=dk?'#cc7744':'#cc3300';
  var rc=dk?'#555':'#ccc';
  var uid='d'+Math.round(pw_m*10+pd_m*10+z.front*10);
  var sfx=ox+pw+4, sfy=oy+ph, sfH=13, sfW=20;
  var stBoxes='';
  for(var i=0;i<z.st;i++){
    var op=(0.35+i*0.14).toFixed(2);
    stBoxes+='<rect x="'+sfx.toFixed(1)+'" y="'+(sfy-(i+1)*sfH).toFixed(1)+'" width="'+sfW+'" height="'+(sfH-1)+'" fill="'+cf+'" opacity="'+op+'" rx="2"/>';
  }
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:260px;height:auto;display:block">'
    +'<defs><pattern id="h'+uid+'" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">'
    +'<line x1="0" y1="0" x2="0" y2="5" stroke="'+hc+'" stroke-width="1.3" opacity="0.65"/></pattern></defs>'
    +'<rect x="'+ox.toFixed(1)+'" y="'+oy.toFixed(1)+'" width="'+pw.toFixed(1)+'" height="'+ph.toFixed(1)+'" fill="'+pf+'" stroke="'+bc+'" stroke-width="1.5"/>'
    +'<rect x="'+ox.toFixed(1)+'" y="'+oy.toFixed(1)+'" width="'+pw.toFixed(1)+'" height="'+fs.toFixed(1)+'" fill="url(#h'+uid+')"/>'
    +'<rect x="'+ox.toFixed(1)+'" y="'+(oy+ph-rs).toFixed(1)+'" width="'+pw.toFixed(1)+'" height="'+rs.toFixed(1)+'" fill="url(#h'+uid+')"/>'
    +'<rect x="'+ox.toFixed(1)+'" y="'+(oy+fs).toFixed(1)+'" width="'+ss.toFixed(1)+'" height="'+(ph-fs-rs).toFixed(1)+'" fill="url(#h'+uid+')"/>'
    +'<rect x="'+(ox+pw-ss).toFixed(1)+'" y="'+(oy+fs).toFixed(1)+'" width="'+ss.toFixed(1)+'" height="'+(ph-fs-rs).toFixed(1)+'" fill="url(#h'+uid+')"/>'
    +'<rect x="'+bx.toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" fill="'+bf+'" stroke="'+cf+'" stroke-width="0.8" stroke-dasharray="4,2"/>'
    +'<rect x="'+bx.toFixed(1)+'" y="'+cY.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+cH.toFixed(1)+'" fill="'+cf+'" opacity="0.3" rx="2"/>'
    +'<text x="'+(ox+pw/2).toFixed(1)+'" y="'+(oy+fs/2+3.5).toFixed(1)+'" text-anchor="middle" font-size="8" fill="'+dc+'" font-family="sans-serif">FRONT '+z.front+'m</text>'
    +'<text x="'+(ox+pw/2).toFixed(1)+'" y="'+(oy+ph-rs/2+3.5).toFixed(1)+'" text-anchor="middle" font-size="8" fill="'+dc+'" font-family="sans-serif">REAR '+z.rear+'m</text>'
    +'<text x="'+(ox+ss/2).toFixed(1)+'" y="'+(oy+ph/2).toFixed(1)+'" text-anchor="middle" font-size="7" fill="'+dc+'" font-family="sans-serif" transform="rotate(-90,'+(ox+ss/2).toFixed(1)+','+(oy+ph/2).toFixed(1)+')">'+z.side+'m</text>'
    +'<text x="'+(bx+bw/2).toFixed(1)+'" y="'+(cY+cH/2+3.5).toFixed(1)+'" text-anchor="middle" font-size="8" fill="'+cf+'" font-family="sans-serif">'+z.cov+'% max</text>'
    +'<rect x="'+ox.toFixed(1)+'" y="'+(oy+ph+3).toFixed(1)+'" width="'+pw.toFixed(1)+'" height="7" fill="'+rc+'" rx="1"/>'
    +'<text x="'+(ox+pw/2).toFixed(1)+'" y="'+(oy+ph+9).toFixed(1)+'" text-anchor="middle" font-size="7" fill="'+tc+'" font-family="sans-serif">ROAD</text>'
    +stBoxes
    +'<text x="'+(sfx+sfW/2).toFixed(1)+'" y="'+(sfy+10).toFixed(1)+'" text-anchor="middle" font-size="7" fill="'+tc+'" font-family="sans-serif">'+z.st+'F</text>'
    +'</svg>';
}

// ── PLOT COVERAGE CALCULATOR ─────────────────────────────────────
function modalCalc(){
  return '<div class="form-grid">'
    +'<div class="fld"><label>Plot Width (metres)</label><input type="number" id="cW" value="30" min="3" oninput="updateCalc()"/></div>'
    +'<div class="fld"><label>Plot Depth (metres)</label><input type="number" id="cD" value="30" min="3" oninput="updateCalc()"/></div>'
    +'<div class="fld"><label>Zone</label><select id="cZ" onchange="updateCalc()">'
    +Object.entries(calcZones).map(function(e){return '<option value="'+e[0]+'">'+e[1].name+'</option>';}).join('')
    +'</select></div>'
    +'</div>'
    +'<div class="result-stats" id="cStats"></div>'
    +'<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start">'
      +'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px" id="cDiag"></div>'
      +'<div style="flex:1;min-width:180px"><div id="cNotes"></div></div>'
    +'</div>';
}
function updateCalc(){
  var w=parseFloat(document.getElementById('cW').value)||30;
  var d=parseFloat(document.getElementById('cD').value)||30;
  var z=calcZones[document.getElementById('cZ').value];
  if(!z)return;
  var bw=Math.max(0,w-2*z.side), bd=Math.max(0,d-z.front-z.rear);
  var pA=w*d, bA=bw*bd, covA=bA*(z.cov/100), openA=pA-covA;
  var ok=bw>0&&bd>0;
  var s=document.getElementById('cStats');
  if(s)s.innerHTML=
    '<div class="rstat"><div class="rv">'+pA.toFixed(0)+'</div><div class="rl">Plot Area (m\u00b2)</div></div>'
    +'<div class="rstat"><div class="rv">'+(pA/4047).toFixed(3)+'</div><div class="rl">Acres</div></div>'
    +'<div class="rstat"><div class="rv" style="color:'+(ok?'var(--green2)':'var(--red)')+'">'+(ok?bA.toFixed(0):'Too small')+'</div><div class="rl">Buildable Envelope (m\u00b2)</div></div>'
    +'<div class="rstat"><div class="rv">'+(ok?covA.toFixed(0):'\u2014')+'</div><div class="rl">Max Footprint (m\u00b2)</div></div>'
    +'<div class="rstat"><div class="rv">'+(ok?openA.toFixed(0):'\u2014')+'</div><div class="rl">Min Open Space (m\u00b2)</div></div>';
  var diag=document.getElementById('cDiag');
  if(diag)diag.innerHTML=ok?makePlotSVG(w,d,z):'<p style="color:var(--red);font-size:12px;padding:12px">Plot too small for this zone\'s setbacks.</p>';
  var notes=document.getElementById('cNotes');
  if(notes&&ok)notes.innerHTML='<div style="font-size:12px">'
    +'<div style="font-weight:600;margin-bottom:8px;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.4px">Setback Requirements</div>'
    +['Front: '+z.front+' m','Side (each): '+z.side+' m','Rear: '+z.rear+' m',
      'Max coverage: '+z.cov+'%','Max height: '+z.st+' storeys',
      'Net buildable width: '+bw.toFixed(1)+' m','Net buildable depth: '+bd.toFixed(1)+' m']
    .map(function(r){return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--text2)">'+r.split(':')[0]+'</span><span style="font-weight:600">'+r.split(':').slice(1).join(':')+'</span></div>';}).join('')
    +'</div>';
}

// ── YIELD CALCULATOR ─────────────────────────────────────────────
function modalYield(){
  return '<div class="form-grid">'
    +'<div class="fld"><label>Site Area</label><input type="number" id="yA" value="5" min="0.1" step="0.1" oninput="updateYield()"/></div>'
    +'<div class="fld"><label>Unit</label><select id="yU" onchange="updateYield()"><option value="ac">Acres</option><option value="m2">m\u00b2</option></select></div>'
    +'<div class="fld"><label>Zone</label><select id="yZ" onchange="updateYield()">'
    +Object.entries(yieldParams).map(function(e){var z=zones.find(function(z){return z.code===e[1].ut||z.code.toLowerCase().indexOf(e[0].slice(2))>-1;});
      return '<option value="'+e[0]+'">'+e[0].toUpperCase()+' \u2014 '+(z?z.name:e[0])+'</option>';}).join('')
    +'</select></div>'
    +'</div>'
    +'<div id="yResults"></div>';
}
function updateYield(){
  var aEl=document.getElementById('yA'),uEl=document.getElementById('yU'),zEl=document.getElementById('yZ');
  if(!aEl||!uEl||!zEl)return;
  var area=parseFloat(aEl.value)||5;
  var unit=uEl.value;
  var acres=unit==='m2'?(area/4047):area;
  var zk=zEl.value;
  var yp=yieldParams[zk];
  if(!yp)return;
  var plots,pop,units;
  if(yp.dpA){plots=Math.floor(acres*yp.dpA);units=plots;pop=units*yp.ppu;}
  else{pop=Math.floor(acres*yp.ppa);units=Math.floor(pop/yp.ppu);plots=units;}
  var osAc=(acres*yp.ros);
  var roadAc=acres*0.25;
  var netAc=acres-osAc-roadAc;
  var res=document.getElementById('yResults');
  if(!res)return;
  res.innerHTML='<div class="result-stats">'
    +'<div class="rstat"><div class="rv">'+plots+'</div><div class="rl">Max '+yp.ut+'</div></div>'
    +'<div class="rstat"><div class="rv">'+pop.toLocaleString()+'</div><div class="rl">Est. population</div></div>'
    +'<div class="rstat"><div class="rv">'+(osAc*4047).toFixed(0)+' m\u00b2</div><div class="rl">Required open space ('+(yp.ros*100)+'%)</div></div>'
    +'<div class="rstat"><div class="rv">'+(roadAc*4047).toFixed(0)+' m\u00b2</div><div class="rl">Est. road/infrastructure area (25%)</div></div>'
    +'<div class="rstat"><div class="rv">'+(netAc*4047).toFixed(0)+' m\u00b2</div><div class="rl">Net developable area</div></div>'
    +'<div class="rstat"><div class="rv">'+(acres*4047).toFixed(0)+' m\u00b2</div><div class="rl">Total site ('+(acres).toFixed(2)+' ac)</div></div>'
    +'</div>'
    +'<div class="result-box" style="margin-top:4px">'
    +'<div style="font-weight:700;font-size:13px;margin-bottom:10px;font-family:var(--font-head)">Land Use Allocation</div>'
    +makeLandAllocSVG(acres,osAc,roadAc,netAc)
    +'<p style="font-size:11px;color:var(--text2);margin-top:10px">&#9432; Estimates based on LUSPA density standards. Actual yields depend on full site analysis, topography, and detailed layout design.</p>'
    +'</div>';
}
function makeLandAllocSVG(tot,os,road,net){
  var W=400,H=36,r=10;
  var total=os+road+net;
  var netW=(net/total)*W, osW=(os/total)*W, roadW=(road/total)*W;
  var colors=['#3a7040','#aaaaaa','#c8960c'];
  var labels=['Net developable','Roads/infra','Open space'];
  var widths=[netW,roadW,osW];
  var bars='';var x=0;
  widths.forEach(function(w,i){
    bars+='<rect x="'+x.toFixed(1)+'" y="0" width="'+w.toFixed(1)+'" height="'+H+'" fill="'+colors[i]+'" opacity="0.85"/>';
    if(w>40)bars+='<text x="'+(x+w/2).toFixed(1)+'" y="'+(H/2+5)+'" text-anchor="middle" font-size="10" fill="#fff" font-family="sans-serif">'+labels[i]+'</text>';
    x+=w;
  });
  var legend=labels.map(function(l,i){return '<g transform="translate('+(i*130)+',0)">'
    +'<rect width="12" height="10" fill="'+colors[i]+'" opacity="0.85" rx="2"/>'
    +'<text x="16" y="9" font-size="10" fill="var(--text)" font-family="sans-serif">'+l+' ('+(widths[i]/W*100).toFixed(0)+'%)</text>'
    +'</g>';}).join('');
  return '<svg viewBox="0 0 400 '+(H+30)+'" style="width:100%;max-width:400px" xmlns="http://www.w3.org/2000/svg">'
    +'<rect width="400" height="'+H+'" fill="var(--border)" rx="'+r+'"/>'
    +'<clipPath id="bar-clip"><rect width="400" height="'+H+'" rx="'+r+'"/></clipPath>'
    +'<g clip-path="url(#bar-clip)">'+bars+'</g>'
    +'<g transform="translate(0,'+(H+12)+')">'+legend+'</g>'
    +'</svg>';
}

// ── RIPARIAN BUFFER CALCULATOR ───────────────────────────────────
var bufBase={reservoir:[60,90],major:[10,60],minor:[10,15],intermittent:[10,20],forest:[10,50],wetland:[30,30]};
function modalBuffer(){
  return '<div class="form-grid">'
    +'<div class="fld"><label>Water body type</label><select id="bT" onchange="updateBuffer()">'
    +'<option value="reservoir">Municipal reservoir/dam (eg. Weija, Kpong)</option>'
    +'<option value="major">Major perennial river (eg. Volta, Tano, Offin, Pra)</option>'
    +'<option value="minor">Minor perennial stream</option>'
    +'<option value="intermittent">Important intermittent stream</option>'
    +'<option value="forest">Stream within forest reserve</option>'
    +'<option value="wetland">Wetland</option>'
    +'</select></div>'
    +'<div class="fld"><label>Site slope (%)<br><input type="range" id="bS" min="0" max="40" value="0" oninput="updateBuffer()" style="width:100%;margin-top:4px"/><span id="bSL" style="font-weight:700">0%</span></label></div>'
    +'</div>'
    +'<div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap">'
    +'<label style="font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer">'
    +'<input type="checkbox" id="bH" onchange="updateBuffer()" style="accent-color:var(--green2)"/> Hazardous substance/petroleum storage nearby (+30\u00a0m)</label>'
    +'<label style="font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer">'
    +'<input type="checkbox" id="bL" onchange="updateBuffer()" style="accent-color:var(--green2)"/> Solid waste landfill/junkyard nearby (+20\u00a0m)</label>'
    +'</div>'
    +'<div id="bResult"></div>';
}
function updateBuffer(){
  var tEl=document.getElementById('bT'),sEl=document.getElementById('bS'),sLEl=document.getElementById('bSL');
  var hEl=document.getElementById('bH'),lEl=document.getElementById('bL'),rEl=document.getElementById('bResult');
  if(!tEl||!rEl)return;
  var type=tEl.value,slope=parseInt(sEl.value)||0;
  if(sLEl)sLEl.textContent=slope+'%';
  var base=bufBase[type],minB=base[0],maxB=base[1];
  var add=0,parts=['Base: '+minB+(minB!==maxB?'\u2013'+maxB:'')+'\u00a0m'];
  if(slope>=15&&slope<20){add+=3;parts.push('+3\u00a0m (slope 15\u201320%)');}
  else if(slope>=20&&slope<25){add+=10;parts.push('+10\u00a0m (slope 20\u201325%)');}
  else if(slope>=25&&slope<30){add+=20;parts.push('+20\u00a0m (slope 25\u201330%)');}
  else if(slope>=30){add+=20;parts.push('+20\u00a0m (slope \u226530%)');}
  if(hEl&&hEl.checked){add+=30;parts.push('+30\u00a0m (hazardous storage)');}
  if(lEl&&lEl.checked){add+=20;parts.push('+20\u00a0m (landfill nearby)');}
  var fMin=minB+add,fMax=maxB+add;
  rEl.innerHTML='<div class="buf-big">'
    +'<div class="buf-num">'+(fMin===fMax?fMin:fMin+'\u2013'+fMax)+'</div>'
    +'<div style="font-size:12px;color:var(--text2);margin-top:4px">metres minimum buffer width required</div>'
    +'<div class="buf-breakdown">'+parts.map(function(p){return '<span>'+p+'</span>';}).join('')+'</div>'
    +'</div>'
    +'<div class="result-box"><div style="font-weight:700;font-size:12px;margin-bottom:8px;font-family:var(--font-head)">What this means on the ground</div>'
    +'<ul style="font-size:12px;color:var(--text2);padding-left:16px;line-height:1.8">'
    +'<li>No new structures or earthworks within '+fMin+(fMin!==fMax?'\u2013'+fMax:'')+'\u00a0m of the water body edge</li>'
    +'<li>Existing structures within the buffer must be reviewed; possible removal may be required</li>'
    +'<li>Buffer area must be retained as natural vegetation or approved permeable surface</li>'
    +'<li>Any activity within the buffer requires explicit Planning Authority and EPA approval</li>'
    +'</ul></div>';
}

function runFinder(){
  var q=(document.getElementById('fQ').value||'').toLowerCase().trim();
  var rEl=document.getElementById('fResults');
  if(!q||q.length<2){rEl.innerHTML='<div style="font-size:12px;color:var(--text2);font-style:italic">Type at least 2 characters.</div>';return;}
  var perm=[],proh=[];
  zones.forEach(function(z){
    var inP=z.permit.some(function(v){return v.toLowerCase().indexOf(q)>-1;});
    var inX=z.prohibit.some(function(v){return v.toLowerCase().indexOf(q)>-1;});
    if(inP)perm.push(z);
    if(inX)proh.push(z);
  });
  if(!perm.length&&!proh.length){rEl.innerHTML='<div style="font-size:12px;color:var(--text2)">No exact matches found. Try a broader term like "market", "industrial", or "residential".</div>';return;}
  rEl.innerHTML='<div class="finder-res">'
    +'<div class="finder-col perm"><h4>&#10003; Permitted in '+perm.length+' zone'+(perm.length!==1?'s':'')+'</h4>'
    +perm.map(function(z){return '<span class="finder-badge" style="background:'+z.bg+';color:'+z.lc+';border-color:'+z.lc+'60" onclick="closeModal();scrollToZone(\''+z.code+'\')" title="View '+z.name+'">'+z.code+'</span>';}).join('')+'</div>'
    +'<div class="finder-col proh"><h4>&#10007; Prohibited in '+proh.length+' zone'+(proh.length!==1?'s':'')+'</h4>'
    +proh.map(function(z){return '<span class="finder-badge" style="background:var(--red-bg);color:var(--red);border-color:var(--red)60" onclick="closeModal();scrollToZone(\''+z.code+'\')" title="View '+z.name+'">'+z.code+'</span>';}).join('')+'</div>'
    +'</div>';
}

function renderLegend(){
  var el=document.getElementById('legendGrid');
  if(!el)return;
  var html='';
  legendGroups.forEach(function(g){
    html+='<div class="leg-group-hdr">'+g.icon+'&nbsp;'+g.hdr+'</div>';
    g.items.forEach(function(item){
      var isLight=isLightColor(item.hex);
      var badgeStyle='background:'+item.hex+';color:'+(isLight?'#222':'#fff')+';border-color:'+item.hex+'cc';
      var codes=item.zones.map(function(z){
        return '<span class="leg-zbadge" style="'+badgeStyle+'">'+z.code+'</span>';
      }).join('');
      var names=item.zones.map(function(z){return z.name;}).join('<br>');
      html+='<div class="leg-item" onclick="copyHex(\''+item.hex+'\')" title="Click to copy '+item.hex+'">'
        +'<div class="leg-swatch" style="background:'+item.hex+'"></div>'
        +'<div class="leg-info">'
          +'<div class="leg-codes">'+codes+'</div>'
          +'<div class="leg-names">'+names+'</div>'
          +'<div class="leg-hex-row">'
            +'<span class="leg-hex">'+item.hex+'</span>'
            +'<span class="leg-colorname">'+item.colorName+'</span>'
            +'<button class="leg-copy-btn" onclick="event.stopPropagation();copyHex(\''+item.hex+'\')">&#128203; Copy hex</button>'
          +'</div>'
          +'<div class="leg-pattern">'+item.pattern+'</div>'
        +'</div>'
      +'</div>';
    });
  });
  el.innerHTML=html;
}
function isLightColor(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000>160;
}
function copyHex(hex){
  navigator.clipboard.writeText(hex).then(function(){showToast('Copied '+hex);}).catch(function(){});
}

function openNoteModal(code){openModal('notes',code);}
function saveNoteModal(){
  var ta=document.getElementById('noteTA');
  if(ta&&currentNoteZone){saveNote(currentNoteZone,ta.value);closeModal();}
}
function clearNote(code){
  delete S.notes[code];lsSet('zn',S.notes);
  var ta=document.getElementById('noteTA');if(ta)ta.value='';
  showToast('Note cleared');render();
}
function renderAllNotes(){
  var el=document.getElementById('allNotesBody');
  if(!el)return;
  var entries=Object.entries(S.notes);
  if(!entries.length){el.innerHTML='<div style="font-size:13px;color:var(--text2);font-style:italic">No notes saved yet. Click &#128396; on any zone card to add a note.</div>';return;}
  el.innerHTML='<div class="notes-list">'
    +entries.map(function(e){
      var z=zones.find(function(zz){return zz.code===e[0];});
      return '<div class="notes-item">'
        +'<span class="nc">'+e[0]+'</span>'
        +'<span class="nn">'+(z?z.name:'')+'</span>'
        +'<span class="nt">'+escHtml(e[1])+'</span>'
        +'<button onclick="openNoteModal(\''+e[0]+'\')" style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--text2);flex-shrink:0">&#9998;</button>'
        +'</div>';
    }).join('')
    +'</div>';
}

function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toggleDark(){
  document.body.classList.toggle('dk');
  var dk=document.body.classList.contains('dk');
  lsSet('zdk',dk);
  document.getElementById('darkBtn').textContent=dk?'\u2600':'\u263D';
}
function toggleSidebar(){
  var sb=document.getElementById('sidebar');
  sb.classList.toggle('open');
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('sh');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('sh');},2200);
}
function copyStd(uid){
  var tb=document.getElementById(uid+'t');
  if(!tb)return;
  var rows=tb.querySelectorAll('tr');
  var text=Array.from(rows).map(function(r){
    var cells=r.querySelectorAll('td');
    return cells[0].textContent+': '+cells[1].textContent;
  }).join('\n');
  var zname=tb.closest('.zone-card').querySelector('.zname').textContent;
  var zcode=tb.closest('.zone-card').querySelector('.zbadge').textContent;
  navigator.clipboard.writeText(zcode+' \u2014 '+zname+'\n'+new Array(zcode.length+zname.length+5).join('\u2013')+'\n\n'+text)
    .then(function(){showToast('Standards copied to clipboard');}).catch(function(){});
}
function printCard(uid){
  var card=document.getElementById(uid);
  if(!card)return;
  var usesPanel=card.querySelector('.uses-panel');
  if(usesPanel)usesPanel.style.display='block';
  window.print();
  if(usesPanel)usesPanel.style.display='';
}

// ── KEYBOARD ─────────────────────────────────────────────────────
document.addEventListener('keydown',function(e){
  var tag=(document.activeElement||{}).tagName||'';
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'){
    if(e.key==='Escape'){document.activeElement.blur();document.getElementById('srch').value='';render();}
    return;
  }
  if(e.key==='/'||e.key==='f'&&!e.ctrlKey&&!e.metaKey){
    e.preventDefault();document.getElementById('srch').focus();return;
  }
  if(e.key==='Escape'){
    var ol=document.getElementById('overlay');
    if(ol.classList.contains('op')){closeModal();return;}
    document.getElementById('srch').value='';render();
  }
  if(e.key==='d'||e.key==='D')toggleDark();
  if(e.key==='g'||e.key==='G')setView('grid');
  if(e.key==='l'||e.key==='L')setView('list');
});

function modalPlanProc(type){
  var p=planProc[type];if(!p)return '';
  var h=p.steps.map(function(s,i){
    var acts=s.acts.map(function(a){return '<li>'+a+'</li>';}).join('');
    var nt=s.note?'<div class="step-note">&#9432;&nbsp;'+s.note+'</div>':'';
    return '<div class="step-item">'
      +'<div class="step-hdr" onclick="toggleStep(this)">'
        +'<div class="step-num">'+(i+1)+'</div>'
        +'<div style="flex:1"><div class="step-title">Step '+(i+1)+': '+s.n+'</div>'
          +'<span class="step-output">Output: '+s.out+'</span></div>'
        +'<span class="step-caret">&#9660;</span></div>'
      +'<div class="step-body"><ul>'+acts+'</ul>'+nt+'</div>'
    +'</div>';
  }).join('');
  return '<div class="steps-intro"><strong>'+p.name+'</strong><br>'
    +'<span style="color:var(--text2)">Duration: '+p.lifespan+' &nbsp;|&nbsp; Review: '+p.review+' &nbsp;|&nbsp; Accuracy: '+p.accuracy+'</span><br>'
    +'<span style="color:var(--text2)">Legal status: '+p.legal+'</span><br>'
    +'<span style="color:var(--text2)">Prepared by: '+p.who+'</span><br>'
    +'<span style="color:var(--text2)">Approval: '+p.approval+'</span></div>'
    +'<p style="font-size:11px;color:var(--text2);margin-bottom:10px">Click any step to expand. All steps are iterative and hinge on stakeholder consultation. Source: LUSPA Manual for Preparation of Spatial Plans, September 2025 (Act 925).</p>'
    +'<div class="step-list">'+h+'</div>';
}
function toggleStep(hdr){
  var b=hdr.parentElement.querySelector('.step-body'),c=hdr.querySelector('.step-caret');
  b.classList.toggle('op');c.style.transform=b.classList.contains('op')?'rotate(180deg)':'';
}

function buildPlanHierarchyView(){
  var plans=[
    {key:'sdf',name:'Spatial Development Framework (SDF)',icon:'&#128506;',lc:'#1a3d1e',life:'20 years',rev:'4 years',acc:'Indicative/strategic',legal:'Framework \u2014 not site-specific',who:'LUSPA / RCC / District Assembly',levels:['National SDF \u2014 entire country incl. marine space','Sub-national SDF \u2014 two or more regions','Regional SDF \u2014 entire administrative region','Sub-regional/Joint District SDF \u2014 parts of region or 2+ districts','District SDF \u2014 entire administrative district']},
    {key:'sp',name:'Structure Plan (SP)',icon:'&#127963;',lc:'#1a2e80',life:'15 years',rev:'5 years',acc:'\u00b110\u00a0m',legal:'Legally binding zones',who:'TSC/SPC \u2192 District Assembly',levels:['Entire metropolitan/municipal/district area','Major settlements and rapidly urbanising areas','Areas of rapid urban growth or regeneration','Old mining towns where economic base has changed','New towns or urban extensions','Areas near planned airports, ports, logistics hubs','Major tourism and heritage conservation areas']},
    {key:'lp',name:'Local Plan (LP)',icon:'&#128205;',lc:'#7a0000',life:'5 years',rev:'5 years',acc:'\u00b10.3\u00a0m (plot level)',legal:'Legally binding \u2014 assigns UPNs to individual plots',who:'TSC/SPC \u2192 District Assembly (sole responsibility)',levels:['ALL areas without exception \u2014 urban, peri-urban and rural','Defines individual plot sizes, uses and building types','Assigns Unique Parcel Numbers (UPN) to each plot','Provides basis for planning & development permit decisions','Provides basis for land registration and street naming']}
  ];
  var cards=plans.map(function(p){
    var lvls=p.levels.map(function(l){return '<div style="font-size:11px;color:var(--text2);padding:3px 0 3px 10px;border-bottom:1px solid var(--border);position:relative"><span style="position:absolute;left:0;color:var(--green3);font-weight:700">&#8250;</span>'+l+'</div>';}).join('');
    return '<div class="plan-card" style="border-left-color:'+p.lc+'"><div class="plan-card-hdr"><span class="plan-icon">'+p.icon+'</span><div><div class="plan-card-title">'+p.name+'</div><div class="plan-card-sub">'+p.life+' lifespan &nbsp;&middot;&nbsp; Reviewed every '+p.rev+'</div></div></div>'
      +'<div class="plan-card-body"><div class="plan-kv"><span>Accuracy</span><span>'+p.acc+'</span></div><div class="plan-kv"><span>Legal status</span><span>'+p.legal+'</span></div><div class="plan-kv"><span>Prepared by</span><span>'+p.who+'</span></div><div style="margin-top:8px">'+lvls+'</div></div>'
      +'<button class="plan-btn" onclick="openModal(\''+p.key+'\')">Open 10-Step Procedure Guide &rarr;</button></div>';
  }).join('');
  var btns=[['approval','&#9989;','Approval Authorities','Who approves each plan type, publication and dissemination requirements under Act 925.'],['consult','&#128101;','Stakeholder Consultations','Minimum 3 mandatory workshops \u2014 Inception, Validation and Preferred Scenario. All plan types.'],['tsc','&#128101;','TSC Team Composition','Full membership of the Technical Sub-Committee (district) and RSPC (regional) per Act 925.'],['dataguide','&#128196;','Data Collection Guide','Sector-by-sector questions for field surveys and interviews \u2014 LUSPA Manual Appendix 4 (2025).'],['legalref','&#9878;&#65039;','Legal References','All Acts, Regulations and Policy Frameworks governing spatial planning in Ghana.'],['allnotes','&#128396;','My Zone Notes','View and edit all personal notes across zone cards.']];
  return '<button onclick="hidePlanPrep()" style="margin-bottom:14px;padding:6px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;color:var(--text2);font-family:var(--font-body)">&#8592; Back to Zone Standards</button>'
    +'<div class="pp-section-hdr">Ghana Three-Tier Spatial Planning System</div>'
    +'<div class="steps-intro" style="margin-bottom:16px">Ghana\'s spatial planning system is built on the <strong>Three-Tier Planning System</strong> established under the Land Use and Spatial Planning Act, 2016 (Act 925) and L.I. 2384. The system operates on the <strong>chain of conformity</strong> principle \u2014 each lower-level plan must conform to the plan immediately above it: LP \u2192 SP \u2192 District SDF \u2192 Regional SDF \u2192 National SDF. All plans use the standardised 10-step process set out in the <em>LUSPA Manual for Preparation of Spatial Plans</em>, September 2025.</div>'
    +'<div class="plan-hierarchy">'+cards+'</div>'
    +'<div class="pp-section-hdr">Quick Reference Tools</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:20px">'
    +btns.map(function(b){return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:box-shadow .15s" onclick="openModal(\''+b[0]+'\')" onmouseenter="this.style.boxShadow=\'var(--shadow-md)\'" onmouseleave="this.style.boxShadow=\'\'"><div style="font-size:18px;margin-bottom:6px">'+b[1]+'</div><div style="font-size:12px;font-weight:700;margin-bottom:4px;color:var(--green2)">'+b[2]+'</div><div style="font-size:11px;color:var(--text2)">'+b[3]+'</div></div>';}).join('')+'</div>';
}
